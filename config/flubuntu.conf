# Flubuntu build configuration
# Sourced by build.sh. All paths relative to the repo root unless absolute.

# ---- Distro identity ----------------------------------------------------
DISTRO_NAME="Flubuntu"
DISTRO_VERSION="26.04"
DISTRO_CODENAME="flubuntu"
ISO_VOLID="Flubuntu 26.04 amd64"          # ISO volume label (max 32 chars)
OUTPUT_ISO="out/flubuntu-26.04-amd64.iso"

# ---- Source ISO ---------------------------------------------------------
# Local Ubuntu 26.04 desktop ISO. If SOURCE_ISO does not exist, build.sh falls
# back to downloading SOURCE_ISO_URL. Checksum verified against SOURCE_ISO_SHA256.
SOURCE_ISO="/home/raphael.bak4/Downloads/ubuntu-26.04-desktop-amd64.iso"
SOURCE_ISO_URL="https://releases.ubuntu.com/26.04/ubuntu-26.04-desktop-amd64.iso"
SOURCE_ISO_SHA256="487f87faaf547ea30e0aba4d5b53346292571256b25333a978db1692bcee9dd2"

# ---- squashfs layer to modify ------------------------------------------
# Ubuntu 26.04 ships LAYERED squashfs in casper/. Snap (snapd, firefox, snap-store,
# firmware-updater) lives in the SELF-CONTAINED base layer `minimal.squashfs`,
# which is also the default installer source (ubuntu-desktop-minimal). We modify
# that layer and rewrite install-sources.yaml so every install uses it — avoiding
# the overlay-whiteout problem of the thin `minimal.standard` diff layer.
TARGET_SQUASHFS="casper/minimal.squashfs"

# ---- Build tunables -----------------------------------------------------
SQUASHFS_COMP="zstd"
SQUASHFS_COMP_ARGS="-Xcompression-level 12"
WORK_DIR="work"               # scratch (extracted ISO + rootfs); big, gitignored
