---
# The `calamares` deb ships no default module configs, so without this the mount
# module bind-mounts nothing into the target and grub-install fails with
# "cannot find a device for /boot/efi" / "failed to get canonical path of
# /dev/vdaX". These are the standard chroot mounts needed by grub-install,
# update-initramfs, apt, etc.
#
# NOTE: per mount.schema.yaml, `options` is an ARRAY of strings (options: [ bind ]
# — NOT the string `bind`), and EFI-only mounts are flagged per-entry with
# `efi: true` (there is no separate extraMountsEfi key).
extraMounts:
    - device: proc
      fs: proc
      mountPoint: /proc
    - device: sys
      fs: sysfs
      mountPoint: /sys
    - device: /dev
      mountPoint: /dev
      options: [ bind ]
    - device: /dev/pts
      fs: devpts
      mountPoint: /dev/pts
    - device: tmpfs
      fs: tmpfs
      mountPoint: /run
    - device: /run/udev
      mountPoint: /run/udev
      options: [ bind ]
    - device: efivarfs
      fs: efivarfs
      mountPoint: /sys/firmware/efi/efivars
      efi: true
