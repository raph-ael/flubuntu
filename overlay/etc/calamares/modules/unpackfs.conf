# Copy Flubuntu's snap-free base rootfs onto the target.
# The live ISO mounts itself at /cdrom; casper/minimal.squashfs is the single
# clean source Flubuntu ships (install-sources collapsed to it too).
---
unpack:
    - source: "/cdrom/casper/minimal.squashfs"
      sourcefs: "squashfs"
      destination: ""
