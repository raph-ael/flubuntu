---
# Runs inside the freshly installed target (dontChroot: false). Strip the
# live-only Calamares bits so the installed Flubuntu carries no installer.
dontChroot: false
timeout: 600
script:
    # Regenerate the initramfs with Ubuntu's own tool. (Calamares' built-in
    # `initramfs` module passes an unsupported `-t` flag to update-initramfs, so
    # it's dropped from the sequence in favour of this.)
    - "update-initramfs -u -k all"
    - "rm -f /etc/xdg/autostart/zz-flubuntu-live-setup.desktop"
    - "rm -f /usr/share/applications/install-flubuntu.desktop"
    - "rm -f /usr/local/bin/flubuntu-live-setup /usr/local/bin/install-flubuntu-launch /usr/local/sbin/flubuntu-calamares"
    - "rm -f /etc/polkit-1/rules.d/49-flubuntu-calamares.rules"
    - "rm -rf /etc/calamares"
    - "update-desktop-database -q || true"
