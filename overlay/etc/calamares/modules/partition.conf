---
efiSystemPartition:     "/boot/efi"
efiSystemPartitionSize: 512M
efiSystemPartitionName: EFI

# Offer swap choices in the UI, but default to none. (A swap *file* inside root
# is a future enhancement; keeping it off makes the erase layout deterministic.)
userSwapChoices:
    - none
    - file
initialPartitioningChoice: erase
initialSwapChoice:         none

defaultFileSystemType:   "ext4"
availableFileSystemTypes: [ "ext4", "btrfs", "xfs" ]

drawNestedPartitions:      false
alwaysShowPartitionLabels: true
allowManualPartitioning:   true

# Explicit layout for automated "erase" installs. Without this, Calamares
# 3.3.14's default auto-layout on UEFI created ONLY the ESP and left root as
# free space (rsync then filled the live tmpfs -> "error code 11"). With an
# explicit layout, Calamares auto-prepends the EFI system partition and creates
# our root partition filling the disk.
partitionLayout:
    - name: "flubuntu-root"
      filesystem: "ext4"
      mountPoint: "/"
      size: 100%

luksGeneration: luks2
