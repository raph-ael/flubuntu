---
# Flubuntu ships both BIOS (grub-pc) and, added in 25-installer.sh, UEFI
# (grub-efi-amd64 + shim-signed) so Calamares can install a working bootloader
# on either firmware. It auto-detects EFI vs BIOS at install time.
efiBootLoader:   "grub"
kernel:          "/vmlinuz"
img:             "/initrd.img"
kernelLine:      ", with Flubuntu"
fallbackKernelLine: ", with Flubuntu (fallback)"

grubInstall:     "grub-install"
grubMkconfig:    "grub-mkconfig"
grubCfg:         "/boot/grub/grub.cfg"
grubProbe:       "grub-probe"
efiBootloaderId: "Flubuntu"

installEFIFallback: true
