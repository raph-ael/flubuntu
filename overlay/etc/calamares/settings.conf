# Flubuntu — Calamares installer configuration.
# Snap-free replacement for Ubuntu 26.04's ubuntu-desktop-bootstrap (snap-only).
# Module *binaries* are searched under the compiled-in path; per-module config
# overrides live in /etc/calamares/modules (shipped via overlay/).
---
modules-search: [ local, /usr/lib/x86_64-linux-gnu/calamares/modules ]

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - luksbootkeyfile
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - grubcfg
  - bootloader
  - packages
  - shellprocess
  - plymouthcfg
  - umount
- show:
  - finished

branding: flubuntu

prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false
